<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markdown Editor</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header class="toolbar">
      <div class="toolbar-group file-actions">
        <button id="btn-open" title="Datei öffnen (Ctrl+O)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 19a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h4l2 2h4a2 2 0 0 1 2 2v1"/><path d="M20.27 13.73A2 2 0 0 0 18.64 13H5.36a2 2 0 0 0-1.95 2.44l.77 4A2 2 0 0 0 6.13 21h11.74a2 2 0 0 0 1.95-1.56l.77-4a2 2 0 0 0-.32-1.71z"/></svg>
          <span>Öffnen</span>
        </button>
        <button id="btn-save" title="Speichern (Ctrl+S)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          <span>Speichern</span>
        </button>
        <button id="btn-download" title="Als Datei herunterladen">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          <span>Download</span>
        </button>
        <button id="btn-pdf" title="Als PDF exportieren (Ctrl+P)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><path d="M9 15h2a1 1 0 0 0 0-2H9v4" stroke-width="1.5"/><path d="M15 13h1.5a1.5 1.5 0 0 1 0 3H15v-4" stroke-width="1.5" fill="none"/></svg>
          <span>PDF</span>
        </button>
        <span id="filename" class="filename">Neue Datei.md</span>
        <span id="modified-indicator" class="modified-indicator hidden">*</span>
      </div>

      <div class="toolbar-group format-actions">
        <button data-action="bold" title="Fett (Ctrl+B)"><strong>B</strong></button>
        <button data-action="italic" title="Kursiv (Ctrl+I)"><em>I</em></button>
        <button data-action="strikethrough" title="Durchgestrichen"><s>S</s></button>
        <span class="separator"></span>
        <button data-action="h1" title="Überschrift 1">H1</button>
        <button data-action="h2" title="Überschrift 2">H2</button>
        <button data-action="h3" title="Überschrift 3">H3</button>
        <span class="separator"></span>
        <button data-action="ul" title="Aufzählung">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="3" cy="6" r="1" fill="currentColor"/><circle cx="3" cy="12" r="1" fill="currentColor"/><circle cx="3" cy="18" r="1" fill="currentColor"/></svg>
        </button>
        <button data-action="ol" title="Nummerierte Liste">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="10" y1="6" x2="21" y2="6"/><line x1="10" y1="12" x2="21" y2="12"/><line x1="10" y1="18" x2="21" y2="18"/><text x="1" y="8" font-size="8" fill="currentColor" stroke="none" font-family="sans-serif">1</text><text x="1" y="14" font-size="8" fill="currentColor" stroke="none" font-family="sans-serif">2</text><text x="1" y="20" font-size="8" fill="currentColor" stroke="none" font-family="sans-serif">3</text></svg>
        </button>
        <button data-action="checklist" title="Checkliste">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="4" height="4" rx="0.5"/><polyline points="4 7 5 8 7 5.5" stroke-width="1.5"/><line x1="10" y1="7" x2="21" y2="7"/><rect x="3" y="14" width="4" height="4" rx="0.5"/><line x1="10" y1="16" x2="21" y2="16"/></svg>
        </button>
        <span class="separator"></span>
        <button data-action="quote" title="Zitat">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V21z"/><path d="M15 21c3 0 7-1 7-8V5c0-1.25-.757-2.017-2-2h-4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2h.75c0 2.25.25 4-2.75 4v3z"/></svg>
        </button>
        <button data-action="code" title="Code inline">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
        </button>
        <button data-action="codeblock" title="Code-Block">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><polyline points="9 8 5 12 9 16"/><polyline points="15 8 19 12 15 16"/></svg>
        </button>
        <button data-action="link" title="Link (Ctrl+K)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
        </button>
        <button data-action="image" title="Bild">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        </button>
        <button data-action="hr" title="Horizontale Linie">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="2" y1="12" x2="22" y2="12"/></svg>
        </button>
        <span class="separator"></span>
        <button data-action="table" title="Tabelle einfügen">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/></svg>
        </button>
      </div>

      <div class="toolbar-group view-actions">
        <button id="btn-toggle-preview" title="Preview ein-/ausblenden">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          <span>Preview</span>
        </button>
      </div>
    </header>

    <main class="editor-container split-view">
      <div class="editor-pane">
        <textarea id="editor" spellcheck="true" placeholder="Markdown hier eingeben..."></textarea>
      </div>
      <div class="preview-pane" id="preview-pane">
        <div id="preview" class="markdown-body"></div>
      </div>
    </main>

    <div id="table-editor-modal" class="modal hidden">
      <div class="modal-backdrop"></div>
      <div class="modal-content">
        <div class="modal-header">
          <h3>Tabelle bearbeiten</h3>
          <button class="modal-close" id="table-modal-close">&times;</button>
        </div>
        <div class="modal-body">
          <div class="table-controls">
            <button id="table-add-row" title="Zeile hinzufügen">+ Zeile</button>
            <button id="table-add-col" title="Spalte hinzufügen">+ Spalte</button>
            <button id="table-del-row" title="Letzte Zeile entfernen">&minus; Zeile</button>
            <button id="table-del-col" title="Letzte Spalte entfernen">&minus; Spalte</button>
          </div>
          <div id="table-grid" class="table-grid"></div>
          <div class="table-alignment">
            <label>Ausrichtung pro Spalte:</label>
            <div id="table-alignment-controls"></div>
          </div>
        </div>
        <div class="modal-footer">
          <button id="table-cancel" class="btn-secondary">Abbrechen</button>
          <button id="table-insert" class="btn-primary">Einfügen</button>
        </div>
      </div>
    </div>

    <div id="drop-overlay" class="drop-overlay hidden">
      <div class="drop-overlay-content">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        <span>Markdown-Datei hier ablegen</span>
      </div>
    </div>

    <footer class="app-footer">
      <div class="footer-left">
        <span class="footer-version">v1.1.0</span>
        <a href="#" id="link-changelog">Changelog</a>
      </div>
      <div class="footer-right">
        <a href="#" id="link-help">Hilfe</a>
        <a href="#" id="link-impressum">Impressum</a>
        <a href="#" id="link-datenschutz">Datenschutz</a>
      </div>
    </footer>

    <div id="legal-modal" class="modal hidden">
      <div class="modal-backdrop"></div>
      <div class="modal-content legal-modal-content">
        <div class="modal-header">
          <h3 id="legal-modal-title"></h3>
          <button class="modal-close" id="legal-modal-close">&times;</button>
        </div>
        <div class="modal-body">
          <div id="legal-modal-body" class="markdown-body"></div>
        </div>
      </div>
    </div>

    <div id="browser-notice" class="browser-notice hidden">
      <span>Direkt Öffnen/Speichern ist nur in Chrome und Edge verfügbar. Du kannst alternativ Upload/Download nutzen.</span>
      <button id="dismiss-notice">&times;</button>
    </div>
  </div>

  <input type="file" id="file-input" accept=".md,.markdown,.txt,.mdx" style="display:none">

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="editor.js"></script>
</body>
</html>
